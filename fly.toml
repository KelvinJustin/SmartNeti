# fly.toml app configuration file generated for smartneti on 2026-06-19T19:30:25Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'smartneti'
primary_region = 'jnb'

[build]
  dockerfile = 'Dockerfile'

[env]
  API_PORT = '8080'
  NODE_ENV = 'production'
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
