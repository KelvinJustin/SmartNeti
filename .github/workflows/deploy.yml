name: SmartNeti Auto Deploy

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Update repository
        run: |
          cd /var/www/html
          git fetch origin
          git reset --hard origin/master

      - name: Clear compiled templates
        run: |
          sudo rm -rf /var/www/html/ui/compiled/*
          sudo rm -rf /var/www/html/ui/cache/*

      - name: Reload Apache
        run: |
          sudo systemctl reload apache2
