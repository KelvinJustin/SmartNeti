name: SmartNeti Auto Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Deploy latest code
        run: |
          cd /var/www/html/SmartNeti
          git fetch origin
          git reset --hard origin/main

      - name: Reload Apache
        run: |
          sudo systemctl reload apache2
